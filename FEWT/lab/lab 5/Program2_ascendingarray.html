<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var temp;
        let n=parseInt(prompt("Enter Length Of string."));
        let arr=[];
        for(i=0;i<n;i++){
            arr[i]=parseInt(prompt("Enter number."));
        }
        for(i=0;i<n;i++){
            for(j=i+1;j<n;j++){
                if(arr[i]>arr[j]){
                    temp=arr[j];
                    arr[j]=arr[i];
                    arr[i]=temp;
                }
            }
        }
        for(i=0;i<n;i++){
            document.write(" "+arr[i]);
        }
    </script>
</body>
</html>
