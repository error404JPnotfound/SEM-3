<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n=parseInt(prompt("Enter Length Of string."));
        let arr=[];
        var max;
        for(i=0;i<n;i++){
            arr[i]=parseInt(prompt("Enter number."));
            if(i==0){
              max=arr[i];  
            }
            else if (arr[i]>max){
                max=arr[i];
            }
        }
        document.write("The maximum is "+max);
    </script>
</body>
</html>
