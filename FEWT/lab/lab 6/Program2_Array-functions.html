<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let arr=[10,90,2,3,4,6,89,23,11];
        document.write("Simple array is :-")
        document.write(arr+"</br></br>")
        arr.push("56")
        document.write("After pushing 56, array is "+arr+"</br></br>")
        arr.pop()
        document.write("After poping , array is "+arr+"</br></br>")
        arr.shift()
        document.write("After shifting array is "+arr+"</br></br>")
        arr.unshift(45)
        document.write("After unshifting is "+arr+"</br></br>")
        arr.splice(4,2)
        document.write("After splicing is "+arr+"</br></br>")
        arr.sort()
        document.write("After sorting is "+arr+"</br></br>")
        document.write("After slicing is "+arr.slice(1,4)+"</br></br>")
    </script>
</body>
</html>
