<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var flag=1;
        let n=parseInt(prompt("Enter a number"));
        for(i=1;i<=n;i++){
            for(j=1;j<=i;j++){
                if(flag%2==0){
                    document.write("0 ");
                }
                else {document.write("1 ")}
                flag++;
            }
            document.write("</br>");
        }
    </script>
</body>
</html>
