<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var ans=1,less;
        let n1=parseInt(prompt("enter number 1"));
        let n2=parseInt(prompt("enter number 2"));
        less=n1>n2? n2:n1;
        for(i=2;i<less;i++){
            if(n1%i==0 && n2%i==0){
                ans=ans*i;
            }
        }
        document.write(ans+" ")
    </script>
</body>
</html>
