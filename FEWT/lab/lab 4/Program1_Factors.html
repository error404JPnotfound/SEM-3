<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=prompt("Enter the number of which you want factor\n");
        var k=0;
        for(var i=2;i<a;i++){
            if(a%i==0){
                document.write(i+" ,");
                k++;
            }
        }
        if(k==0){
            alert("Given number is a prime number.\n")
        }
    </script>
</body>
</html>
