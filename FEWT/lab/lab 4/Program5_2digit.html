<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        ans=1;
        let n1=parseInt(prompt("Enter two digit number"))
        pow=n1%10;
        n1=n1/10;
        for(i=1;i<=pow;i++){
            ans=ans*n1;
        }
        document.write(ans+" ");
    </script>
</body>
</html>
