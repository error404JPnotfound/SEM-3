<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n1=parseInt(prompt("Enter a number"));
        let n2=parseInt(prompt("Enter another number"));
        let op=prompt("Enter any operator +,-,/,*,%");
        if(op=='+'){
            alert("Ans is "+(n1+n2));
        }
        else if(op=='-'){
            alert("Ans is "+(n1-n2));
        }
        else if(op=='/'){
            alert("Ans is "+(n1/n2));
        }
        else if(op=='%'){
            alert("Ans is "+(n1%n2));
        }
        else if(op=='*'){
            alert("Ans is "+(n1*n2));
        }
        else alert("Operator not valid.")
    </script>
</body>
</html>
