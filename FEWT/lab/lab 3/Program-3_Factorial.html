<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n1=parseInt(prompt("Enter a number"));
        var ans=1;
        while(n1!=1){
            ans=ans*n1;
            n1-=1;
        }
        alert("The Answer is "+ans);
    </script>
</body>
</html>
