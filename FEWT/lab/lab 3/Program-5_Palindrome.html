<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n1=parseInt(prompt("Enter a number"));
        var rev=0,rem=0,org=n1;
        while(n1!=0){
            rem=n1%10;
            rev=rev*10+rem;
            n1=parseInt(n1/10);
        }
        if(rev==org){
            alert("It is a palindrome number");
        }
        else alert("It is not a palindrome number");
    </script>
</body>
</html>
