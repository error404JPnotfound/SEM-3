<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var d=0;
        let n1=parseInt(prompt("Enter a number"));
        for(numbertype=2;numbertype<n1;numbertype++){
            if(n1%numbertype==0){
                d++;
            }
        }
        if(d==0){
            alert("It was a prime number");
        }
        else alert("It was not a prime number");
    </script>
</body>
</html>
